// Read the EXIF orientation tag (1-8) from a JPEG ArrayBuffer. Returns 1 (normal) if absent/unreadable.
function readExifOrientation(buf) {
  try {
    const view = new DataView(buf);
    if (view.getUint16(0, false) !== 0xFFD8) return 1; // not a JPEG
    let offset = 2;
    const length = view.byteLength;
    while (offset < length) {
      const marker = view.getUint16(offset, false);
      offset += 2;
      if (marker === 0xFFE1) { // APP1 (EXIF)
        const exifLength = view.getUint16(offset, false);
        const tiffOffset = offset + 2 + 6; // skip segment length + "Exif\0\0"
        if (view.getUint32(tiffOffset, false) !== 0x49492A00 && view.getUint32(tiffOffset, false) !== 0x4D4D002A) return 1;
        const little = view.getUint16(tiffOffset, false) === 0x4949;
        const firstIFD = view.getUint32(tiffOffset + 4, little);
        const dirStart = tiffOffset + firstIFD;
        const entries = view.getUint16(dirStart, little);
        for (let i = 0; i < entries; i++) {
          const entryOffset = dirStart + 2 + i * 12;
          if (view.getUint16(entryOffset, little) === 0x0112) { // Orientation tag
            return view.getUint16(entryOffset + 8, little);
          }
        }
        return 1;
      } else if ((marker & 0xFF00) !== 0xFF00) {
        break;
      } else {
        offset += view.getUint16(offset, false);
      }
    }
  } catch (e) { /* fall through */ }
  return 1;
}

async function loadCorrectedImage(file, maxDim = 2000) {
  const buf = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("Couldn't read photo"));
    r.readAsArrayBuffer(file);
  });
  const orientation = readExifOrientation(buf);
  const blobUrl = URL.createObjectURL(new Blob([buf]));
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error("Couldn't load photo"));
    i.src = blobUrl;
  });
  URL.revokeObjectURL(blobUrl);

  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const sw = Math.round(img.width * scale);
  const sh = Math.round(img.height * scale);
  const swapDims = orientation >= 5;
  const c = document.createElement("canvas");
  c.width = swapDims ? sh : sw;
  c.height = swapDims ? sw : sh;
  const ctx = c.getContext("2d");

  // Apply the transform that corrects each EXIF orientation back to "normal".
  switch (orientation) {
    case 2: ctx.transform(-1, 0, 0, 1, sw, 0); break;
    case 3: ctx.transform(-1, 0, 0, -1, sw, sh); break;
    case 4: ctx.transform(1, 0, 0, -1, 0, sh); break;
    case 5: ctx.transform(0, 1, 1, 0, 0, 0); break;
    case 6: ctx.transform(0, 1, -1, 0, sh, 0); break;
    case 7: ctx.transform(0, -1, -1, 0, sh, sw); break;
    case 8: ctx.transform(0, -1, 1, 0, 0, sw); break;
    default: break; // 1 or unrecognized: no transform
  }

  // grayscale + mild contrast boost helps OCR on photos
  ctx.filter = "grayscale(1) contrast(1.25)";
  ctx.drawImage(img, 0, 0, sw, sh);
  return c;
}

// Return [0°, 90°, 180°, 270°] rotated versions of a canvas as data URLs.
// EXIF tags lie or get stripped often enough that trying all four and picking
// the one OCR can actually read is more reliable than trusting the tag alone.
function rotationVariants(srcCanvas) {
  const variants = [];
  for (const deg of [0, 90, 180, 270]) {
    const swap = deg === 90 || deg === 270;
    const c = document.createElement("canvas");
    c.width = swap ? srcCanvas.height : srcCanvas.width;
    c.height = swap ? srcCanvas.width : srcCanvas.height;
    const ctx = c.getContext("2d");
    switch (deg) {
      case 90: ctx.transform(0, 1, -1, 0, c.width, 0); break;
      case 180: ctx.transform(-1, 0, 0, -1, c.width, c.height); break;
      case 270: ctx.transform(0, -1, 1, 0, 0, c.height); break;
      default: break;
    }
    ctx.drawImage(srcCanvas, 0, 0);
    variants.push({ deg, dataUrl: c.toDataURL("image/jpeg", 0.9) });
  }
  return variants;
}

// Quick score: how many tokens in this text look like real Subaru part
// numbers or readable words? Used to pick the best-oriented OCR pass.
function ocrScore(text) {
  const tokens = (text || "").toUpperCase().match(/[A-Z0-9]{3,14}/g) || [];
  let score = 0;
  for (const t of tokens) {
    if (/^[A-Z]\d{3}[A-Z]{3}\d{3}$/.test(t) || /^[A-Z]\d{4}[A-Z]{2}\d{3}$/.test(t) || /^MSA[A-Z0-9]{6,8}$/.test(t)) score += 5;
    else if (/^[A-Z]{3,}$/.test(t)) score += 1; // plausible English word
  }
  return score;
}

// OCR confuses these character pairs; map BOTH the dictionary and the
// scanned tokens through the same table so they still match each other.
const CONFUSION = { O: "0", Q: "0", I: "1", Z: "2", S: "5", B: "8", G: "6" };
const canonical = (s) => normPart(s).replace(/[OQIZSBG]/g, (c) => CONFUSION[c]);

let _ocrWorker = null;
let _ocrProgress = null;
async function getOcrWorker() {
  if (_ocrWorker) return _ocrWorker;
  _ocrWorker = await Tesseract.createWorker("eng", 1, {
    logger: (m) => {
      if (m.status === "recognizing text" && _ocrProgress) _ocrProgress(Math.round(m.progress * 100));
    },
  });
  return _ocrWorker;
}

const MODEL_WORDS = ["OUTBACK", "FORESTER", "CROSSTREK", "IMPREZA", "WRX", "BRZ", "SOLTERRA", "ASCENT", "LEGACY"];

async function extractSheetOCR(srcCanvas, partList, onProgress) {
  const worker = await getOcrWorker();
  const variants = rotationVariants(srcCanvas);

  // Quick pass on all 4 orientations (sparse text detection is faster) to find the winner.
  let best = null;
  for (let i = 0; i < variants.length; i++) {
    if (onProgress) onProgress(Math.round((i / variants.length) * 50));
    const { data } = await worker.recognize(variants[i].dataUrl);
    const score = ocrScore(data.text);
    if (!best || score > best.score) best = { ...variants[i], score, text: data.text };
    if (best.score >= 25) break; // clearly found the right orientation, stop early
  }

  _ocrProgress = onProgress;
  // Final pass on the winning orientation for the cleanest possible text.
  const { data } = await worker.recognize(best.dataUrl);
  _ocrProgress = null;

  const fullText = (data.text || best.text || "").toUpperCase();
  const lines = fullText.split("\n").map((l) => l.trim()).filter(Boolean);

  // VIN: 17 chars, no I/O/Q — search line by line, prefer Subaru "JF" prefix
  let vin = "";
  for (const l of lines) {
    const compact = l.replace(/\s/g, "");
    const m = compact.match(/JF[A-HJ-NPR-Z0-9]{15}/) || compact.match(/^[A-HJ-NPR-Z0-9]{17}$/);
    if (m) { vin = m[0]; break; }
  }

  // Model
  const model = MODEL_WORDS.find((w) => fullText.includes(w)) || "";

  // Build canonical dictionary from the editable catalog (parts only)
  const dict = {};
  (partList || []).forEach((c) => {
    if (c.part) dict[canonical(c.part)] = { part: c.part, name: c.name, min: parseFloat(c.min) || 0 };
  });

  // Subaru part-number shapes — for catching parts not yet in the dictionary.
  // We only trust the part number; descriptions from OCR are ignored entirely.
  const PART_SHAPES = [
    /^[A-Z]\d{3}[A-Z]{3}\d{3}$/, // J501SAR000, H505SAN000, E775SAR000, J205SAR100
    /^[A-Z]\d{4}[A-Z]{2}\d{3}$/, // J2050FN001
    /^MSA[A-Z0-9]{6,8}$/,        // MSA6A1602, MSA5M2604K
  ];
  const looksLikePart = (t) => PART_SHAPES.some((re) => re.test(t));

  // Pull every token from the whole sheet and match on part number only.
  const allTokens = fullText.match(/[A-Z0-9]{3,14}/g) || [];
  const items = [];
  const seen = new Set();
  for (const tok of allTokens) {
    const can = canonical(tok);
    if (seen.has(can)) continue;
    if (dict[can]) {
      seen.add(can);
      const d = dict[can];
      items.push({ key: uid(), part: d.part, name: d.name, min: d.min, known: true, checked: true });
    } else if (looksLikePart(tok) && !(vin && vin.includes(tok))) {
      seen.add(can);
      items.push({ key: uid(), part: tok, name: tok, min: "", known: false, checked: false });
    }
  }
  return { model, vin, items, rawText: fullText };
}

function migrate(d) {
  if (!d.goal) d.goal = 440;
  if (!d.days) d.days = {};
  if (!Array.isArray(d.catalog)) {
    // Build the editable catalog from the built-in list the first time.
    d.catalog = CATALOG.map(([model, name, min, part]) => ({
      id: uid(), model: model, name: name, min: min, part: part || "", actual: "",
    }));
    // Fold in any parts taught during earlier scans so they show up here too.
    if (d.learned) {
      Object.entries(d.learned).forEach(([part, v]) => {
        if (!d.catalog.some((c) => normPart(c.part) === normPart(part))) {
          d.catalog.push({ id: uid(), model: "Outback", name: v.name || part, min: v.min, part: part, actual: "" });
        }
      });
    }
  }
  // Ensure every catalog item has an actual-minutes field
  d.catalog.forEach((c) => { if (c.actual === undefined) c.actual = ""; });
  // Migrate the old "All Models" label to the new "Universal Parts" bucket
  d.catalog.forEach((c) => { if (c.model === "All Models") c.model = "Universal Parts"; });
  // Editable model list — real models only. "All Models" (master view) and
  // "Universal Parts" (shared installs) are permanent fixtures, not user models.
  if (!Array.isArray(d.models)) {
    const used = Array.from(new Set(d.catalog.map((c) => c.model)));
    const real = MODELS.filter((m) => m !== "All Models");
    d.models = real.filter((m) => used.includes(m)).concat(used.filter((m) => !real.includes(m) && m !== "Universal Parts"));
    if (!d.models.length) d.models = real.slice();
  } else {
    d.models = d.models.filter((m) => m !== "All Models" && m !== "Universal Parts");
  }
  return d;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return migrate(JSON.parse(raw));
  } catch (e) {}
  return migrate({ goal: 440, learned: {}, days: {} });
}

  const [data, setData] = useState(loadData);
  const [space, setSpace] = useState("tracker"); // tracker | pace | installs

  const [showSettings, setShowSettings] = useState(false);

  const [model, setModel] = useState("Outback");

  const [scanProg, setScanProg] = useState(0);
  const [scanErr, setScanErr] = useState("");
  const [scanDebugImg, setScanDebugImg] = useState(null);
  const [review, setReview] = useState(null);
  const [toast, setToast] = useState("");
  // Pace state
  const [openModel, setOpenModel] = useState(null);
  const [openInstall, setOpenInstall] = useState(null);
  const [timer, setTimer] = useState(null); // { id, startedAt }
  const [now, setNow] = useState(Date.now());
  const fileRef = useRef(null);

  // Stopwatch ticker — only runs while a timer is active
  useEffect(() => {
    if (!timer) return;
    const iv = setInterval(() => setNow(Date.now()), 200);
    return () => clearInterval(iv);
  }, [timer]);

  const save = (next) => {
    setData(next);
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(next));
    } catch (e) {
      setToast("Save failed — storage full?");
    }
  };

  const day = todayKey();
  const entries = data.days[day] || [];
  const total = entries.reduce((s, e) => s + e.min, 0);
  const goal = data.goal || 440;
  const pct = Math.min(100, (total / goal) * 100);
  const remaining = Math.max(0, goal - total);
  const hit = total >= goal;

  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  };

  const addEntriesWith = (base, list) => {
    const stamped = list.map((e) => ({ ...e, id: uid(), ts: Date.now() }));
    save({ ...base, days: { ...base.days, [day]: [...(base.days[day] || []), ...stamped] } });
  };
  const addEntries = (list) => addEntriesWith(data, list);

  const removeEntry = (id) =>
    save({ ...data, days: { ...data.days, [day]: entries.filter((e) => e.id !== id) } });

  const onPhoto = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setScanning(true);
    setScanProg(0);
    setScanErr("");
    setScanDebugImg(null);
    try {
      const canvas = await loadCorrectedImage(file);
      const result = await extractSheetOCR(canvas, data.catalog, setScanProg);
      const vin = (result.vin || "").trim();
      const dupVin = !!vin && Object.values(data.days).some((d) => d.some((en) => en.vin === vin));
      const items = result.items;
      if (!items.length) {
        const snippet = (result.rawText || "").replace(/\s+/g, " ").trim().slice(0, 220);
        setScanDebugImg(dataUrl);
        throw new Error(
          "No part numbers matched. " +
          (snippet ? "OCR read: \u201c" + snippet + (result.rawText.length > 220 ? "\u2026" : "") + "\u201d" : "OCR found no text at all \u2014 check lighting/focus.")
        );
      }
      setReview({ model: result.model || "", vin, dupVin, items });
    } catch (err) {
      setScanErr(err.message || "Scan failed. Check connection and try again.");
    } finally {
      setScanning(false);
    }
  };

  const confirmReview = () => {
    const picked = review.items.filter((i) => i.checked && i.min !== "" && !isNaN(parseFloat(i.min)));
    if (!picked.length) { setReview(null); return; }
    const catalog = data.catalog.slice();
    picked.forEach((i) => {
      if (!i.known && normPart(i.part)) {
        const exists = catalog.some((c) => c.part && canonical(c.part) === canonical(i.part));
        if (!exists) {
          catalog.push({ id: uid(), model: review.model || "Outback", name: i.name || i.part, min: parseFloat(i.min), part: i.part });
        }
      }
    });
    addEntriesWith({ ...data, catalog }, picked.map((i) => ({
      name: i.name, min: parseFloat(i.min), part: i.part, vin: review.vin || undefined,
    })));
    setReview(null);
    flash("+" + fmt(picked.reduce((s, i) => s + parseFloat(i.min), 0)) + " min banked");
  };

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return data.catalog.filter((c) =>
      q
        ? (c.name || "").toLowerCase().includes(q) || (c.part || "").toLowerCase().includes(q) || (c.model || "").toLowerCase().includes(q)
        : model === "All Models" ? true : c.model === model
    );
  }, [search, model, data.catalog]);

  const updateCatalogItem = (id, field, value) =>
    save({ ...data, catalog: data.catalog.map((c) => (c.id === id ? { ...c, [field]: value } : c)) });

  const addCatalogItem = () => {
    const m = (model === "All Models" || search) ? (data.models[0] || "Universal Parts") : model;
    save({ ...data, catalog: [{ id: uid(), model: m, name: "", part: "", min: "", actual: "" }, ...data.catalog] });
  };

  const removeCatalogItem = (id, name) => {
    if (window.confirm("Delete \"" + (name || "this install") + "\"? This only changes your list, not your logged minutes.")) {
      save({ ...data, catalog: data.catalog.filter((c) => c.id !== id) });
    }
  };

  // ----- Model management (lives in INSTALLS) -----
  const addModel = () => {
    const name = (window.prompt("New model name:") || "").trim();
    if (!name) return;
    if (data.models.some((m) => m.toLowerCase() === name.toLowerCase())) { flash("That model already exists"); return; }
    save({ ...data, models: [...data.models, name] });
    setModel(name);
  };
  const renameModel = (oldName) => {
    const name = (window.prompt("Rename \"" + oldName + "\" to:", oldName) || "").trim();
    if (!name || name === oldName) return;
    if (data.models.some((m) => m.toLowerCase() === name.toLowerCase())) { flash("That model already exists"); return; }
    save({
      ...data,
      models: data.models.map((m) => (m === oldName ? name : m)),
      catalog: data.catalog.map((c) => (c.model === oldName ? { ...c, model: name } : c)),
    });
    if (model === oldName) setModel(name);
  };
  const removeModel = (name) => {
    const count = data.catalog.filter((c) => c.model === name).length;
    if (count > 0) { window.alert("Can't delete \"" + name + "\" — it still has " + count + " install(s). Move or delete those first."); return; }
    if (window.confirm("Delete model \"" + name + "\"?")) {
      const models = data.models.filter((m) => m !== name);
      save({ ...data, models });
      if (model === name) setModel(models[0] || "");
    }
  };

  // ----- Pace / stopwatch -----
  const setActual = (id, value) =>
    save({ ...data, catalog: data.catalog.map((c) => (c.id === id ? { ...c, actual: value } : c)) });

  const toggleTimer = (item) => {
    if (timer && timer.id === item.id) {
      // stop & overwrite actual
      const mins = (Date.now() - timer.startedAt) / 60000;
      setActual(item.id, Math.round(mins * 10) / 10);
      setTimer(null);
      flash("Recorded " + fmt(Math.round(mins * 10) / 10) + " min for " + item.name);
    } else {
      setTimer({ id: item.id, startedAt: Date.now() });
      setNow(Date.now());
    }
  };
  const elapsedMin = (id) => (timer && timer.id === id ? (now - timer.startedAt) / 60000 : 0);

  const exportCSV = () => {
    const rows = [["date", "time", "install", "part", "minutes"]];
    Object.keys(data.days).sort().forEach((d) =>
      data.days[d].forEach((e) =>
        rows.push([d, new Date(e.ts).toLocaleTimeString(), e.name, e.part || "", e.min])
      )
    );
    const csv = rows.map((r) => r.map((c) => '"' + String(c).replace(/"/g, '""') + '"').join(",")).join("\n");
    const url = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    const a = document.createElement("a");
    a.href = url;
    a.download = "production-log-" + day + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={S.app}>
      {/* Header */}
      <div style={S.header}>
        <div>
          <div style={S.brand}>MINUTE BANK</div>
          <div style={S.sub}>{new Date().toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}</div>
        </div>
        {space === "tracker" && <button style={S.iconBtn} onClick={() => setShowSettings(true)}>⚙</button>}
      </div>

      {/* Top-level nav */}
      <div style={S.nav}>
        {[["tracker", "TRACKER"], ["pace", "PACE"], ["installs", "INSTALLS"]].map(([v, label]) => (
          <button key={v} style={{ ...S.navBtn, ...(space === v ? S.navOn : {}) }} onClick={() => setSpace(v)}>
            {label}
          </button>
        ))}
      </div>

      {space === "tracker" && (
        <div style={S.subnav}>
          {[["today", "TODAY"], ["history", "HISTORY"]].map(([v, label]) => (
            <button key={v} style={{ ...S.subBtn, ...(trackerView === v ? S.subOn : {}) }} onClick={() => setTrackerView(v)}>
              {label}
            </button>
          ))}
        </div>
      )}

      {space === "tracker" && trackerView === "today" ? (
        <React.Fragment>
          <div style={S.board}>
            <div style={S.bigRow}>
              <span style={{ ...S.bigNum, color: hit ? "#57C271" : "#FFB81C" }}>{fmt(total)}</span>
              <span style={S.bigDen}>/ {goal} min</span>
            </div>
            <div style={S.track}>
              <div style={{ ...S.fill, width: pct + "%", background: hit ? "#57C271" : "#FFB81C" }} />
              {[...Array(7)].map((_, i) => (
                <div key={i} style={{ ...S.tick, left: ((i + 1) / 8) * 100 + "%" }} />
              ))}
            </div>
            <div style={S.boardFoot}>
              <span>{pct.toFixed(0)}%</span>
              <span style={{ color: hit ? "#57C271" : "#9aa0a6" }}>
                {hit ? "GOAL HIT — gravy time" : fmt(remaining) + " min to go"}
              </span>
            </div>
          </div>

          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={onPhoto} />
          <button style={S.scanBtn} disabled={scanning} onClick={() => fileRef.current && fileRef.current.click()}>
            {scanning ? (scanProg > 0 ? "READING SHEET… " + scanProg + "%" : "LOADING OCR…") : "📷  SCAN PARTS SHEET"}
          </button>
          {scanErr && <div style={S.err}>{scanErr}</div>}

          <div style={S.section}>QUICK ADD</div>
          <input style={S.search} placeholder="Search installs…" value={search} onChange={(e) => setSearch(e.target.value)} />
          {!search && (
            <div style={S.chips}>
              <button style={{ ...S.chip, ...("All Models" === model ? S.chipOn : {}) }} onClick={() => setModel("All Models")}>All Models</button>
              {data.models.map((m) => (
                <button key={m} style={{ ...S.chip, ...(m === model ? S.chipOn : {}) }} onClick={() => setModel(m)}>
                  {m}
                </button>
              ))}
              <button style={{ ...S.chip, ...("Universal Parts" === model ? S.chipOn : {}) }} onClick={() => setModel("Universal Parts")}>Universal Parts</button>
            </div>
          )}
          <div style={S.list}>
            {filtered.map((c) => {
              const cm = parseFloat(c.min) || 0;
              return (
                <button key={c.id} style={S.row} onClick={() => { addEntries([{ name: c.name, min: cm, part: c.part }]); flash("+" + fmt(cm) + " min — " + c.name); }}>
                  <span style={S.rowName}>
                    {c.name}
                    {search ? <span style={S.rowCat}> · {c.model}</span> : null}
                  </span>
                  <span style={S.rowMin}>+{fmt(cm)}</span>
                </button>
              );
            })}
            {filtered.length === 0 && <div style={S.empty}>No installs here yet. Add some in the Installs tab.</div>}
          </div>

          <div style={S.section}>TODAY'S LOG ({entries.length})</div>
          {entries.length === 0 ? (
            <div style={S.empty}>Nothing banked yet. Scan a sheet or tap an install above.</div>
          ) : (
            <div style={S.list}>
              {[...entries].reverse().map((e) => (
                <div key={e.id} style={S.logRow}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={S.rowName}>{e.name}</div>
                    <div style={S.logMeta}>
                      {new Date(e.ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}
                      {e.vin ? " · …" + e.vin.slice(-6) : ""}
                    </div>
                  </div>
                  <span style={S.rowMin}>+{fmt(e.min)}</span>
                  <button style={S.del} onClick={() => removeEntry(e.id)}>✕</button>
                </div>
              ))}
            </div>
          )}
        </React.Fragment>
      ) : space === "tracker" && trackerView === "history" ? (
        <React.Fragment>
          <div style={S.section}>DAILY HISTORY</div>
          <div style={S.list}>
            {Object.keys(data.days).sort().reverse().map((d) => {
              const t = data.days[d].reduce((s, e) => s + e.min, 0);
              const p = Math.min(100, (t / goal) * 100);
              return (
                <div key={d} style={S.histRow}>
                  <div style={{ flex: 1 }}>
                    <div style={S.rowName}>
                      {d === day ? "Today" : new Date(d + "T12:00").toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}
                    </div>
                    <div style={{ ...S.track, height: 6, marginTop: 6 }}>
                      <div style={{ ...S.fill, width: p + "%", background: t >= goal ? "#57C271" : "#FFB81C" }} />
                    </div>
                  </div>
                  <div style={{ textAlign: "right", marginLeft: 14 }}>
                    <div style={{ ...S.rowMin, color: t >= goal ? "#57C271" : "#FFB81C" }}>{fmt(t)}</div>
                    <div style={S.logMeta}>{p.toFixed(0)}%</div>
                  </div>
                </div>
              );
            })}
            {Object.keys(data.days).length === 0 && <div style={S.empty}>No days logged yet.</div>}
          </div>
          <div style={{ height: 12 }} />
          <button style={{ ...S.scanBtn, background: "#2A2E33", color: "#F2F0EB" }} onClick={exportCSV}>
            ⬇ EXPORT FULL LOG (CSV)
          </button>
          <div style={S.logMeta}>Keep the CSV as your own paper trail — proof of your numbers if they're ever questioned.</div>
        </React.Fragment>
      ) : space === "installs" ? (
        <React.Fragment>
          <div style={S.section}>MODELS</div>
          <div style={S.chips}>
            <button style={{ ...S.chip, ...("All Models" === model ? S.chipOn : {}) }} onClick={() => setModel("All Models")}>All Models</button>
            {data.models.map((m) => (
              <button key={m} style={{ ...S.chip, ...(m === model ? S.chipOn : {}) }} onClick={() => setModel(m)} onDoubleClick={() => renameModel(m)}>
                {m}
              </button>
            ))}
            <button style={{ ...S.chip, ...("Universal Parts" === model ? S.chipOn : {}) }} onClick={() => setModel("Universal Parts")}>Universal Parts</button>
            <button style={{ ...S.chip, borderStyle: "dashed", color: "#FFB81C" }} onClick={addModel}>+ MODEL</button>
          </div>
          {model !== "All Models" && model !== "Universal Parts" && (
            <div style={S.modelTools}>
              <button style={S.smallBtn} onClick={() => renameModel(model)}>Rename “{model}”</button>
              <button style={{ ...S.smallBtn, color: "#ff9ea2", borderColor: "#5a3034" }} onClick={() => removeModel(model)}>Delete model</button>
            </div>
          )}
          {model === "All Models" && (
            <div style={S.logMeta}>Master list — every install across every model. Read here, edit anywhere.</div>
          )}
          {model === "Universal Parts" && (
            <div style={S.logMeta}>Installs that apply to every vehicle — stickers, PDIs, and the like. These show up under every model's Pace and Quick Add too.</div>
          )}

          <div style={S.section}>{model.toUpperCase()} INSTALLS</div>
          <button style={{ ...S.scanBtn, fontSize: 17 }} onClick={addCatalogItem}>+ ADD INSTALL</button>
          <input style={S.search} placeholder="Search all installs…" value={search} onChange={(e) => setSearch(e.target.value)} />
          <div style={S.logMeta}>
            Name, part number, minutes given, and your actual minutes. Changes here feed both Tracker and Pace. “Actual” can also be set by the stopwatch in Pace.
          </div>
          <div style={{ ...S.list, marginTop: 8 }}>
            {filtered.map((c) => (
              <div key={c.id} style={S.editCard}>
                <div style={S.editRow}>
                  <input
                    style={S.editName}
                    placeholder="Install name"
                    value={c.name}
                    onChange={(e) => updateCatalogItem(c.id, "name", e.target.value)}
                  />
                  {model === "All Models" && (
                    <select
                      style={S.modelSelect}
                      value={c.model}
                      onChange={(e) => updateCatalogItem(c.id, "model", e.target.value)}
                    >
                      <option value="Universal Parts">Universal</option>
                      {data.models.map((m) => (
                        <option key={m} value={m}>{m}</option>
                      ))}
                    </select>
                  )}
                </div>
                <div style={S.editRow}>
                  <input
                    style={S.editPart}
                    placeholder="Part # (optional)"
                    value={c.part}
                    onChange={(e) => updateCatalogItem(c.id, "part", e.target.value.toUpperCase())}
                  />
                  <button style={S.delBox} onClick={() => removeCatalogItem(c.id, c.name)}>✕</button>
                </div>
                <div style={S.editRow}>
                  <div style={S.fieldWrap}>
                    <span style={S.fieldLbl}>GIVEN</span>
                    <input
                      style={S.editMin}
                      type="text" inputMode="decimal" placeholder="min"
                      value={c.min}
                      onChange={(e) => updateCatalogItem(c.id, "min", e.target.value)}
                    />
                  </div>
                  <div style={S.fieldWrap}>
                    <span style={S.fieldLbl}>ACTUAL</span>
                    <input
                      style={{ ...S.editMin, borderColor: "#3a3f45", color: "#F2F0EB" }}
                      type="text" inputMode="decimal" placeholder="—"
                      value={c.actual}
                      onChange={(e) => updateCatalogItem(c.id, "actual", e.target.value)}
                    />
                  </div>
                </div>
              </div>
            ))}
            {filtered.length === 0 && <div style={S.empty}>No installs here. Tap “+ Add Install” to create one.</div>}
          </div>
        </React.Fragment>
      ) : (
        /* ---------- PACE ---------- */
        <React.Fragment>
          <div style={S.section}>PACE — YOUR SPEED VS. STANDARD</div>
          <div style={S.list}>
            {["All Models", ...data.models].map((m) => {
              const installs = m === "All Models"
                ? data.catalog
                : data.catalog.filter((c) => c.model === m || c.model === "Universal Parts");
              const isOpen = openModel === m;
              return (
                <div key={m}>
                  <button style={{ ...S.modelRow, ...(isOpen ? S.modelRowOpen : {}) }} onClick={() => { setOpenModel(isOpen ? null : m); setOpenInstall(null); }}>
                    <span>{m}</span>
                    <span style={S.modelCount}>{installs.length} {isOpen ? "▲" : "▼"}</span>
                  </button>
                  {isOpen && (
                    <div style={S.dropWrap}>
                      {installs.length === 0 && <div style={S.empty}>No installs for {m} yet.</div>}
                      {installs.map((c) => {
                        const given = parseFloat(c.min) || 0;
                        const running = timer && timer.id === c.id;
                        const actual = running ? elapsedMin(c.id) : (parseFloat(c.actual) || 0);
                        const hasActual = running || (c.actual !== "" && !isNaN(parseFloat(c.actual)));
                        const diff = Math.round((given - actual) * 10) / 10;
                        const detailOpen = openInstall === c.id;
                        const maxBar = Math.max(given, actual, 1);
                        return (
                          <div key={c.id} style={S.paceItem}>
                            <button style={S.paceHead} onClick={() => setOpenInstall(detailOpen ? null : c.id)}>
                              <span style={S.rowName}>{c.name}</span>
                              <span style={{ ...S.rowMin, color: !hasActual ? "#5f656c" : diff >= 0 ? "#57C271" : "#E5484D" }}>
                                {hasActual ? (diff >= 0 ? "+" : "") + fmt(diff) : "—"}
                              </span>
                            </button>
                            {detailOpen && (
                              <div style={S.paceDetail}>
                                <div style={S.paceMeta}>{c.part || "no part #"} · given {fmt(given)} min</div>
                                {/* Two-bar graph */}
                                <div style={S.barRow}>
                                  <div style={S.barCol}>
                                    <div style={S.barTrack}>
                                      <div style={{ ...S.bar, height: (given / maxBar) * 100 + "%", background: "#FFB81C" }} />
                                    </div>
                                    <span style={S.barLbl}>GIVEN</span>
                                    <span style={S.barVal}>{fmt(given)}</span>
                                  </div>
                                  <div style={S.barCol}>
                                    <div style={S.barTrack}>
                                      <div style={{ ...S.bar, height: (actual / maxBar) * 100 + "%", background: running ? "#7aa2ff" : diff >= 0 ? "#57C271" : "#E5484D" }} />
                                    </div>
                                    <span style={S.barLbl}>ACTUAL</span>
                                    <span style={S.barVal}>{hasActual ? fmt(Math.round(actual * 10) / 10) : "—"}</span>
                                  </div>
                                </div>
                                {hasActual && !running && (
                                  <div style={{ ...S.paceVerdict, color: diff >= 0 ? "#57C271" : "#E5484D" }}>
                                    {diff >= 0 ? "+" + fmt(diff) + " min ahead — that's gravy" : fmt(Math.abs(diff)) + " min behind standard"}
                                  </div>
                                )}
                                {/* Stopwatch + manual */}
                                <div style={S.swRow}>
                                  <button style={{ ...S.swBtn, background: running ? "#E5484D" : "#FFB81C" }} onClick={() => toggleTimer(c)}>
                                    {running ? "STOP " + fmt(Math.round(elapsedMin(c.id) * 10) / 10) : "▶ START TIMER"}
                                  </button>
                                  <div style={S.fieldWrap}>
                                    <span style={S.fieldLbl}>SET MIN</span>
                                    <input
                                      style={{ ...S.editMin, borderColor: "#3a3f45", color: "#F2F0EB" }}
                                      type="text" inputMode="decimal" placeholder="—"
                                      value={c.actual}
                                      onChange={(e) => setActual(c.id, e.target.value)}
                                    />
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            {data.models.length === 0 && <div style={S.empty}>Add a model in the Installs tab to get started.</div>}
          </div>
        </React.Fragment>
      )}

      {/* Settings */}
      {showSettings && (
        <div style={S.overlay} onClick={(e) => { if (e.target === e.currentTarget) setShowSettings(false); }}>
          <div style={S.sheet}>
            <div style={S.sheetHead}>
              <div style={S.brand}>SETTINGS</div>
              <button style={S.iconBtn} onClick={() => setShowSettings(false)}>DONE</button>
            </div>
            <div style={S.section}>DAILY GOAL (MINUTES)</div>
            <input
              style={S.search}
              type="number"
              inputMode="numeric"
              value={goal}
              onChange={(e) => save({ ...data, goal: parseFloat(e.target.value) || 440 })}
            />
            <div style={S.logMeta}>
              Sheet scanning runs entirely on this phone — free, no account, photos never leave the device. First scan downloads the OCR engine (~3 MB), so do it on WiFi once.
            </div>
          </div>
        </div>
      )}

      {/* Scan review */}
      {review && (
        <div style={S.overlay}>
          <div style={S.sheet}>
            <div style={S.sheetHead}>
              <div>
                <div style={S.brand}>SHEET FOUND</div>
                <div style={S.sub}>
                  {review.model || "Unknown model"}
                  {review.vin ? " · …" + review.vin.slice(-6) : ""}
                </div>
              </div>
              <button style={S.iconBtn} onClick={() => setReview(null)}>CANCEL</button>
            </div>
            {review.dupVin && (
              <div style={S.warn}>⚠ You already logged installs for this VIN. Double-check before confirming.</div>
            )}
            <div style={S.pdiRow}>
              {data.catalog
                .filter((c) => c.model === "Universal Parts" && /PDI/i.test(c.name))
                .map((c) => {
                  const inReview = review.items.some((i) => i.pdiId === c.id);
                  return (
                    <button
                      key={c.id}
                      style={{ ...S.pdiBtn, ...(inReview ? S.pdiBtnOn : {}) }}
                      onClick={() =>
                        setReview({
                          ...review,
                          items: inReview
                            ? review.items.filter((i) => i.pdiId !== c.id)
                            : [...review.items, { key: uid(), pdiId: c.id, part: c.part, desc: c.name, name: c.name, min: parseFloat(c.min) || 0, known: true, checked: true }],
                        })
                      }
                    >
                      {inReview ? "✓ " : "+ "}{c.name} (+{fmt(parseFloat(c.min) || 0)})
                    </button>
                  );
                })}
            </div>
            <div style={{ overflowY: "auto", flex: 1 }}>
              {review.items.map((it) => (
                <div key={it.key} style={{ ...S.revRow, opacity: it.checked ? 1 : 0.45 }}>
                  <button
                    style={{ ...S.check, ...(it.checked ? S.checkOn : {}) }}
                    onClick={() =>
                      setReview({ ...review, items: review.items.map((x) => (x.key === it.key ? { ...x, checked: !x.checked } : x)) })
                    }
                  >
                    {it.checked ? "✓" : ""}
                  </button>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={S.rowName}>{it.known ? it.name : it.part}</div>
                    <div style={S.logMeta}>{it.known ? it.part : "New part — set minutes once"}</div>
                  </div>
                  {it.known ? (
                    <span style={S.rowMin}>+{fmt(it.min)}</span>
                  ) : (
                    <input
                      style={S.minInput}
                      type="number"
                      inputMode="decimal"
                      placeholder="min?"
                      value={it.min}
                      onChange={(e) =>
                        setReview({
                          ...review,
                          items: review.items.map((x) =>
                            x.key === it.key ? { ...x, min: e.target.value, checked: e.target.value !== "" } : x
                          ),
                        })
                      }
                    />
                  )}
                </div>
              ))}
              <div style={{ ...S.logMeta, padding: "10px 4px" }}>
                Unchecked items are skipped. Type minutes for new parts once — the app remembers them.
              </div>
            </div>
            <button style={S.scanBtn} onClick={confirmReview}>
              BANK {fmt(review.items.filter((i) => i.checked && i.min !== "" && !isNaN(parseFloat(i.min))).reduce((s, i) => s + parseFloat(i.min), 0))} MIN
            </button>
          </div>
        </div>
      )}

      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}
