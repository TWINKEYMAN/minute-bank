const STORE_KEY = "minutebank:v1";

const normPart = (s) => (s || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const fmt = (n) => (Math.round(n * 10) / 10).toLocaleString();
const uid = () => Math.random().toString(36).slice(2, 9);

async function fileToDataUrl(file, maxDim = 2000) {
  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("Couldn't read photo"));
    r.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error("Couldn't load photo"));
    i.src = dataUrl;
  });
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const c = document.createElement("canvas");
  c.width = Math.round(img.width * scale);
  c.height = Math.round(img.height * scale);
  const ctx = c.getContext("2d");
  // grayscale + mild contrast boost helps OCR on photos
  ctx.filter = "grayscale(1) contrast(1.25)";
  ctx.drawImage(img, 0, 0, c.width, c.height);
  return c.toDataURL("image/jpeg", 0.9);
}

// OCR confuses these character pairs; map BOTH the dictionary and the
// scanned tokens through the same table so they still match each other.
const CONFUSION = { O: "0", Q: "0", I: "1", Z: "2", S: "5", B: "8", G: "6" };
const canonical = (s) => normPart(s).replace(/[OQIZSBG]/g, (c) => CONFUSION[c]);

let _ocrWorker = null;
let _ocrProgress = null;
async function getOcrWorker() {
  if (_ocrWorker) return _ocrWorker;
  _ocrWorker = await Tesseract.createWorker("eng", 1, {
    logger: (m) => {
      if (m.status === "recognizing text" && _ocrProgress) _ocrProgress(Math.round(m.progress * 100));
    },
  });
  return _ocrWorker;
}

const MODEL_WORDS = ["OUTBACK", "FORESTER", "CROSSTREK", "IMPREZA", "WRX", "BRZ", "SOLTERRA", "ASCENT", "LEGACY"];

async function extractSheetOCR(dataUrl, learned, onProgress) {
  _ocrProgress = onProgress;
  const worker = await getOcrWorker();
  const { data } = await worker.recognize(dataUrl);
  _ocrProgress = null;

  const fullText = (data.text || "").toUpperCase();
  const lines = fullText.split("\n").map((l) => l.trim()).filter(Boolean);

  // VIN: 17 chars, no I/O/Q — search line by line, prefer Subaru "JF" prefix
  let vin = "";
  for (const l of lines) {
    const compact = l.replace(/\s/g, "");
    const m = compact.match(/JF[A-HJ-NPR-Z0-9]{15}/) || compact.match(/^[A-HJ-NPR-Z0-9]{17}$/);
    if (m) { vin = m[0]; break; }
  }

  // Model
  const model = MODEL_WORDS.find((w) => fullText.includes(w)) || "";

  // Build canonical dictionary from seed + learned parts
  const dict = {};
  Object.entries(SEED_PARTS).forEach(([p, v]) => (dict[canonical(p)] = { part: p, ...v }));
  Object.entries(learned || {}).forEach(([p, v]) => (dict[canonical(p)] = { part: p, ...v }));

  const items = [];
  const seen = new Set();
  for (const line of lines) {
    const tokens = line.match(/[A-Z0-9]{3,14}/g) || [];
    for (const tok of tokens) {
      const can = canonical(tok);
      if (seen.has(can)) continue;
      const lineDesc = line.replace(tok, "").replace(/[^A-Z0-9 \-\/&]/g, "").replace(/\s+/g, " ").trim();
      if (dict[can]) {
        seen.add(can);
        items.push({ key: uid(), part: dict[can].part, desc: lineDesc, name: dict[can].name, min: dict[can].min, known: true, checked: true });
      } else if (
        /^(?=.*[A-Z])(?=.*\d)[A-Z0-9]{6,12}$/.test(tok) && // looks like a part number
        !(vin && vin.includes(tok)) // not a chunk of the VIN
      ) {
        seen.add(can);
        items.push({ key: uid(), part: tok, desc: lineDesc, name: lineDesc || tok, min: "", known: false, checked: false });
      }
    }
  }
  return { model, vin, items };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { goal: 440, learned: {}, days: {} };
}

function MinuteBank() {
  const [data, setData] = useState(loadData);
  const [view, setView] = useState("main");
  const [showSettings, setShowSettings] = useState(false);
  const [search, setSearch] = useState("");
  const [model, setModel] = useState("Outback");
  const [scanning, setScanning] = useState(false);
  const [scanProg, setScanProg] = useState(0);
  const [scanErr, setScanErr] = useState("");
  const [review, setReview] = useState(null);
  const [toast, setToast] = useState("");
  const fileRef = useRef(null);

  const save = (next) => {
    setData(next);
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(next));
    } catch (e) {
      setToast("Save failed — storage full?");
    }
  };

  const day = todayKey();
  const entries = data.days[day] || [];
  const total = entries.reduce((s, e) => s + e.min, 0);
  const goal = data.goal || 440;
  const pct = Math.min(100, (total / goal) * 100);
  const remaining = Math.max(0, goal - total);
  const hit = total >= goal;

  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  };

  const addEntriesWith = (base, list) => {
    const stamped = list.map((e) => ({ ...e, id: uid(), ts: Date.now() }));
    save({ ...base, days: { ...base.days, [day]: [...(base.days[day] || []), ...stamped] } });
  };
  const addEntries = (list) => addEntriesWith(data, list);

  const removeEntry = (id) =>
    save({ ...data, days: { ...data.days, [day]: entries.filter((e) => e.id !== id) } });

  const onPhoto = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setScanning(true);
    setScanProg(0);
    setScanErr("");
    try {
      const dataUrl = await fileToDataUrl(file);
      const result = await extractSheetOCR(dataUrl, data.learned, setScanProg);
      const vin = (result.vin || "").trim();
      const dupVin = !!vin && Object.values(data.days).some((d) => d.some((en) => en.vin === vin));
      const items = result.items;
      if (!items.length) throw new Error("No parts found on that photo. Try a straighter, closer shot.");
      setReview({ model: result.model || "", vin, dupVin, items });
    } catch (err) {
      setScanErr(err.message || "Scan failed. Check connection and try again.");
    } finally {
      setScanning(false);
    }
  };

  const confirmReview = () => {
    const picked = review.items.filter((i) => i.checked && i.min !== "" && !isNaN(parseFloat(i.min)));
    if (!picked.length) { setReview(null); return; }
    const learned = { ...(data.learned || {}) };
    picked.forEach((i) => {
      const p = normPart(i.part);
      if (!i.known && p) learned[p] = { name: i.name, min: parseFloat(i.min) };
    });
    addEntriesWith({ ...data, learned }, picked.map((i) => ({
      name: i.name, min: parseFloat(i.min), part: i.part, vin: review.vin || undefined,
    })));
    setReview(null);
    flash("+" + fmt(picked.reduce((s, i) => s + parseFloat(i.min), 0)) + " min banked");
  };

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return CATALOG.filter(([cat, name]) =>
      q ? name.toLowerCase().includes(q) || cat.toLowerCase().includes(q) : cat === model
    );
  }, [search, model]);

  const exportCSV = () => {
    const rows = [["date", "time", "install", "part", "minutes"]];
    Object.keys(data.days).sort().forEach((d) =>
      data.days[d].forEach((e) =>
        rows.push([d, new Date(e.ts).toLocaleTimeString(), e.name, e.part || "", e.min])
      )
    );
    const csv = rows.map((r) => r.map((c) => '"' + String(c).replace(/"/g, '""') + '"').join(",")).join("\n");
    const url = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
    const a = document.createElement("a");
    a.href = url;
    a.download = "production-log-" + day + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={S.app}>
      {/* Header */}
      <div style={S.header}>
        <div>
          <div style={S.brand}>MINUTE BANK</div>
          <div style={S.sub}>{new Date().toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}</div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button style={S.iconBtn} onClick={() => setShowSettings(true)}>⚙</button>
          <button style={S.iconBtn} onClick={() => setView(view === "main" ? "history" : "main")}>
            {view === "main" ? "HISTORY" : "TODAY"}
          </button>
        </div>
      </div>

      {view === "main" ? (
        <React.Fragment>
          <div style={S.board}>
            <div style={S.bigRow}>
              <span style={{ ...S.bigNum, color: hit ? "#57C271" : "#FFB81C" }}>{fmt(total)}</span>
              <span style={S.bigDen}>/ {goal} min</span>
            </div>
            <div style={S.track}>
              <div style={{ ...S.fill, width: pct + "%", background: hit ? "#57C271" : "#FFB81C" }} />
              {[...Array(7)].map((_, i) => (
                <div key={i} style={{ ...S.tick, left: ((i + 1) / 8) * 100 + "%" }} />
              ))}
            </div>
            <div style={S.boardFoot}>
              <span>{pct.toFixed(0)}%</span>
              <span style={{ color: hit ? "#57C271" : "#9aa0a6" }}>
                {hit ? "GOAL HIT — gravy time" : fmt(remaining) + " min to go"}
              </span>
            </div>
          </div>

          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={onPhoto} />
          <button style={S.scanBtn} disabled={scanning} onClick={() => fileRef.current && fileRef.current.click()}>
            {scanning ? (scanProg > 0 ? "READING SHEET… " + scanProg + "%" : "LOADING OCR…") : "📷  SCAN PARTS SHEET"}
          </button>
          {scanErr && <div style={S.err}>{scanErr}</div>}

          <div style={S.section}>QUICK ADD</div>
          <input style={S.search} placeholder="Search installs…" value={search} onChange={(e) => setSearch(e.target.value)} />
          {!search && (
            <div style={S.chips}>
              {MODELS.map((m) => (
                <button key={m} style={{ ...S.chip, ...(m === model ? S.chipOn : {}) }} onClick={() => setModel(m)}>
                  {m}
                </button>
              ))}
            </div>
          )}
          <div style={S.list}>
            {filtered.map(([cat, name, min, part], i) => (
              <button key={i} style={S.row} onClick={() => { addEntries([{ name, min, part }]); flash("+" + fmt(min) + " min — " + name); }}>
                <span style={S.rowName}>
                  {name}
                  {search ? <span style={S.rowCat}> · {cat}</span> : null}
                </span>
                <span style={S.rowMin}>+{fmt(min)}</span>
              </button>
            ))}
          </div>

          <div style={S.section}>TODAY'S LOG ({entries.length})</div>
          {entries.length === 0 ? (
            <div style={S.empty}>Nothing banked yet. Scan a sheet or tap an install above.</div>
          ) : (
            <div style={S.list}>
              {[...entries].reverse().map((e) => (
                <div key={e.id} style={S.logRow}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={S.rowName}>{e.name}</div>
                    <div style={S.logMeta}>
                      {new Date(e.ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}
                      {e.vin ? " · …" + e.vin.slice(-6) : ""}
                    </div>
                  </div>
                  <span style={S.rowMin}>+{fmt(e.min)}</span>
                  <button style={S.del} onClick={() => removeEntry(e.id)}>✕</button>
                </div>
              ))}
            </div>
          )}
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div style={S.section}>DAILY HISTORY</div>
          <div style={S.list}>
            {Object.keys(data.days).sort().reverse().map((d) => {
              const t = data.days[d].reduce((s, e) => s + e.min, 0);
              const p = Math.min(100, (t / goal) * 100);
              return (
                <div key={d} style={S.histRow}>
                  <div style={{ flex: 1 }}>
                    <div style={S.rowName}>
                      {d === day ? "Today" : new Date(d + "T12:00").toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}
                    </div>
                    <div style={{ ...S.track, height: 6, marginTop: 6 }}>
                      <div style={{ ...S.fill, width: p + "%", background: t >= goal ? "#57C271" : "#FFB81C" }} />
                    </div>
                  </div>
                  <div style={{ textAlign: "right", marginLeft: 14 }}>
                    <div style={{ ...S.rowMin, color: t >= goal ? "#57C271" : "#FFB81C" }}>{fmt(t)}</div>
                    <div style={S.logMeta}>{p.toFixed(0)}%</div>
                  </div>
                </div>
              );
            })}
            {Object.keys(data.days).length === 0 && <div style={S.empty}>No days logged yet.</div>}
          </div>
          <div style={{ height: 12 }} />
          <button style={{ ...S.scanBtn, background: "#2A2E33", color: "#F2F0EB" }} onClick={exportCSV}>
            ⬇ EXPORT FULL LOG (CSV)
          </button>
          <div style={S.logMeta}>Keep the CSV as your own paper trail — proof of your numbers if they're ever questioned.</div>
        </React.Fragment>
      )}

      {/* Settings */}
      {showSettings && (
        <div style={S.overlay} onClick={(e) => { if (e.target === e.currentTarget) setShowSettings(false); }}>
          <div style={S.sheet}>
            <div style={S.sheetHead}>
              <div style={S.brand}>SETTINGS</div>
              <button style={S.iconBtn} onClick={() => setShowSettings(false)}>DONE</button>
            </div>
            <div style={S.section}>DAILY GOAL (MINUTES)</div>
            <input
              style={S.search}
              type="number"
              inputMode="numeric"
              value={goal}
              onChange={(e) => save({ ...data, goal: parseFloat(e.target.value) || 440 })}
            />
            <div style={S.logMeta}>
              Sheet scanning runs entirely on this phone — free, no account, photos never leave the device. First scan downloads the OCR engine (~3 MB), so do it on WiFi once.
            </div>
          </div>
        </div>
      )}

      {/* Scan review */}
      {review && (
        <div style={S.overlay}>
          <div style={S.sheet}>
            <div style={S.sheetHead}>
              <div>
                <div style={S.brand}>SHEET FOUND</div>
                <div style={S.sub}>
                  {review.model || "Unknown model"}
                  {review.vin ? " · …" + review.vin.slice(-6) : ""}
                </div>
              </div>
              <button style={S.iconBtn} onClick={() => setReview(null)}>CANCEL</button>
            </div>
            {review.dupVin && (
              <div style={S.warn}>⚠ You already logged installs for this VIN. Double-check before confirming.</div>
            )}
            <div style={{ overflowY: "auto", flex: 1 }}>
              {review.items.map((it) => (
                <div key={it.key} style={{ ...S.revRow, opacity: it.checked ? 1 : 0.45 }}>
                  <button
                    style={{ ...S.check, ...(it.checked ? S.checkOn : {}) }}
                    onClick={() =>
                      setReview({ ...review, items: review.items.map((x) => (x.key === it.key ? { ...x, checked: !x.checked } : x)) })
                    }
                  >
                    {it.checked ? "✓" : ""}
                  </button>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={S.rowName}>{it.desc || it.name}</div>
                    <div style={S.logMeta}>{it.part}</div>
                  </div>
                  {it.known ? (
                    <span style={S.rowMin}>+{fmt(it.min)}</span>
                  ) : (
                    <input
                      style={S.minInput}
                      type="number"
                      inputMode="decimal"
                      placeholder="min?"
                      value={it.min}
                      onChange={(e) =>
                        setReview({
                          ...review,
                          items: review.items.map((x) =>
                            x.key === it.key ? { ...x, min: e.target.value, checked: e.target.value !== "" } : x
                          ),
                        })
                      }
                    />
                  )}
                </div>
              ))}
              <div style={{ ...S.logMeta, padding: "10px 4px" }}>
                Unchecked items are skipped. Type minutes for new parts once — the app remembers them.
              </div>
            </div>
            <button style={S.scanBtn} onClick={confirmReview}>
              BANK {fmt(review.items.filter((i) => i.checked && i.min !== "" && !isNaN(parseFloat(i.min))).reduce((s, i) => s + parseFloat(i.min), 0))} MIN
            </button>
          </div>
        </div>
      )}

      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

</script>
